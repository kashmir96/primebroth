[build]
  functions = "functions"

[build.environment]
  HUGO_VERSION = "0.123.3"

# ── AU subdomain redirect ────────────────────────────────────────────────────
# Sends au.primalpantry.co.nz/* → www.primalpantry.co.nz/*?market=au
# Uses 302 (temporary) so browsers never permanently cache it.
# au.primalpantry.co.nz must be added as a domain alias in Netlify dashboard.
[[redirects]]
  from = "https://au.primalpantry.co.nz/*"
  to = "https://www.primalpantry.co.nz/:splat?market=au"
  status = 302
  force = true

