<script>

(function() {
    try {
        var cart = JSON.parse(localStorage.getItem('cartV2')) || [];
        var subtotal = cart.reduce(function(sum, item) {
            return sum + (parseFloat(item.price || 0) * (parseInt(item.quantity || 1)));
        }, 0);
        if (subtotal > 0) {
            var pts = ppCalcPoints(subtotal);
            var banner = document.getElementById('pp-co-pts-banner');
            var val = document.getElementById('pp-co-pts-val');
            if (banner && val) {
                val.textContent = pts.toLocaleString() + ' PrimalPoints';
                banner.style.display = '';
            }
        }
    } catch(e) {}
})();
</script>

<script>
(function() {
    
    var market = (typeof window.MARKET !== 'undefined') ? window.MARKET : 'NZ';
    var stripeKey = market === 'AU'
        ? 'pk_live_51T7LFcJzNO9WRf4JmC4gn05XRKUSJ4h8YQ8d93SGfArOteqfBBgWWGQRyPYNubwdgcgerXV6UjT6MyeHH1arTd8I007AaC7fyZ'
        : 'pk_live_51QKEaJFZRwx5tlYmhyIEFR3mGroCdpqIHHVT68y9jGnizGDZXypuSfjilbCSkMarU39KeV4kUulC6HfpReRSJwb000fyIehR3I';

    
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) {
            window.location.href = '/cart/';
        }
    });

    
    var cart = [];
    try { cart = JSON.parse(localStorage.getItem('cartV2')) || []; } catch(e) {}

    if (!cart.length) {
        
        document.getElementById('coLoading').style.display = 'none';
        document.getElementById('coError').innerHTML = '<p>Your order has already been placed!</p><a href="/shop/" class="pp-co-error-back">Continue Shopping</a><a href="/cart/" class="pp-co-error-back" style="margin-left:16px;">Back to Cart</a>';
        document.getElementById('coError').style.display = '';
        return;
    }

    
    localStorage.setItem('previouscart', JSON.stringify(cart));

    
    var countryCode = market || 'NZ';
    var currencyCode = market === 'AU' ? 'AUD' : 'NZD';

    if (typeof gtag !== 'undefined') {
        var subtotal = cart.reduce(function(s, i) { return s + (parseFloat(i.unitPrice) || 0) * (parseInt(i.quantity) || 1); }, 0);
        gtag('event', 'begin_checkout', {
            currency: currencyCode, value: subtotal,
            items: cart.map(function(i) {
                return { item_id: i.priceId, item_name: i.title, item_variant: i.flavor || '', item_category: i.size || '', price: parseFloat(i.unitPrice), quantity: parseInt(i.quantity) || 1 };
            })
        });
    }
    if (typeof oso === 'function') oso('event', 'proceed to checkout');

    
    function mountWithSecret(clientSecret) {
        function mountCheckout() {
            var stripe = Stripe(stripeKey);
            stripe.initEmbeddedCheckout({ clientSecret: clientSecret })
                .then(function(checkout) {
                    document.getElementById('coLoading').style.display = 'none';
                    checkout.mount('#checkout');
                });
        }
        if (typeof Stripe !== 'undefined') {
            mountCheckout();
        } else {
            document.querySelector('script[src*="js.stripe.com"]').addEventListener('load', mountCheckout);
        }
    }

    
    var prefetchedSecret = sessionStorage.getItem('pp_checkout_secret');
    if (prefetchedSecret) {
        sessionStorage.removeItem('pp_checkout_secret');
        mountWithSecret(prefetchedSecret);
    } else {
        
        var ss = sessionStorage;
        var osoMeta = {
            landing_page: ss.getItem('oso_lp') || '',
            analytics_source: ss.getItem('oso_src') || '',
            magnet_product: ss.getItem('oso_magnet') || '',
            last_product_page: ss.getItem('oso_last_product') || ''
        };
        var clientInfo = {
            browser: (navigator.userAgent.match(/(Chrome|Firefox|Safari|Edge|Opera)[\/\s](\d+)/) || [])[1] || '',
            device: window.innerWidth < 768 ? 'Mobile' : window.innerWidth < 1024 ? 'Tablet' : 'Desktop',
            os: navigator.platform || '',
            screenWidth: window.innerWidth
        };

        fetch('/.netlify/functions/create-checkout-session', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                cart: cart.map(function(i) { return { priceId: i.priceId, quantity: parseInt(i.quantity) || 1 }; }),
                countryCode: countryCode,
                osoMeta: osoMeta,
                clientInfo: clientInfo,
                quizBundle: (function() {
                    try {
                        var pids = JSON.parse(localStorage.getItem('quiz_bundle_pids') || '[]');
                        if (!pids.length) return false;
                        var cartPids = cart.map(function(i) { return i.priceId; });
                        return pids.every(function(pid) { return cartPids.indexOf(pid) !== -1; });
                    } catch(e) { return false; }
                })(),
                giftCode: sessionStorage.getItem('pp_gift_code') || null
            })
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (data.clientSecret) {
                mountWithSecret(data.clientSecret);
            } else {
                document.getElementById('coLoading').style.display = 'none';
                document.getElementById('coError').style.display = '';
            }
        })
        .catch(function() {
            document.getElementById('coLoading').style.display = 'none';
            document.getElementById('coError').style.display = '';
        });
    }
})();
</script>
