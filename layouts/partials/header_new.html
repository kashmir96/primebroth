<header>
    <!-- Preconnect to critical third-party origins (saves ~100-300ms per origin) -->
    <link rel="preconnect" href="https://cdn.usefathom.com" crossorigin>
    <link rel="preconnect" href="https://connect.facebook.net" crossorigin>
    <link rel="preconnect" href="https://www.primalpantry.co.nz" crossorigin>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <!-- Preload hero image on homepage (fixes LCP — biggest single win) -->
    {{ if .IsHome }}
    <link rel="preload" as="image" href="/img/home/hero.webp" fetchpriority="high">
    {{ end }}

    <!-- Preload logo so nav renders fast -->
    <link rel="preload" as="image" href="{{ .Site.Params.logo.main | relURL }}" fetchpriority="high">

    <!-- Fathom - beautiful, simple website analytics -->
    <script src="https://cdn.usefathom.com/script.js" data-site="SUFMJROW" defer></script>
    <!-- / Fathom -->

    <!-- Google Analytics -->
    {{ template "_internal/google_analytics.html" . }}
    <!-- / Google Analytics -->

    <!-- Meta Pixel Code -->
    <script>
        !function(f,b,e,v,n,t,s) {
            if(f.fbq) return;
            n = f.fbq = function() {
                n.callMethod ? n.callMethod.apply(n, arguments) : n.queue.push(arguments)
            };
            if(!f._fbq) f._fbq = n;
            n.push = n;
            n.loaded = !0;
            n.version = '2.0';
            n.queue = [];
            t = b.createElement(e);
            t.async = !0;
            t.src = v;
            s = b.getElementsByTagName(e)[0];
            s.parentNode.insertBefore(t, s)
        }(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');
        fbq('init', '809100344281173');
        fbq('track', 'PageView');
    </script>
    <noscript>
        <img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=809100344281173&ev=PageView&noscript=1"/>
    </noscript>
    <!-- End Meta Pixel Code -->

    <div id="overlay">
        <ul class="text-center list-unstyled text-white fs-5">
            {{ range .Site.Menus.main }}
            <li class="p-2">
                <a href="{{ .URL | safeURL }}">
                    <span>{{ .Name }}</span>
                </a>
            </li>
            {{ end }}
        </ul>
    </div>

    <nav class="navbar navbar-expand-lg navbar-light">
        <div class="container-fluid">

            <div class="d-block d-lg-none">
                <div id="hamburgerbtn" class="flex cursor-pointer items-center w-14 h-10 py-2 rounded mopen">
                    <span class="top"></span>
                    <span class="middle"></span>
                    <span class="bottom"></span>
                </div>
            </div>

            <div class="d-flex align-items-center flex-shrink-0 text-xl text-grey-900">
                <a href="{{ .Site.BaseURL }}" aria-label="PrimalPantry">
                    <img alt="{{ .Site.Params.logo.alt }}" class="sitelogo mr-3" src="{{ .Site.Params.logo.main | relURL }}" width="120" height="36">
                </a>
            </div>

            <a class="iglink d-lg-none" href="/cart">
                <div class="cart-icon-container" style="position: relative; display: inline-block;">
                    <img src="/img/cart.webp" alt="Cart for PrimalPantry" width="24" height="24">
                    <span class="cart-badge" style="display: none; position: absolute; top: 0; right: 0; background-color: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px;">1</span>
                </div>
            </a>

            <div class="d-none w-full block flex-grow d-lg-flex align-items-center w-lg-auto" id="mobileMenu">
                <ul class="navbar-nav ms-auto">
                    {{ range .Site.Menus.main }}
                    <li class="nav-item">
                        <a class="nav-link {{ if eq .URL $.RelPermalink }}active{{ end }}" aria-current="page" href="{{ .URL | safeURL }}">{{ .Name }}</a>
                    </li>
                    {{ end }}
                </ul>

                <a class="iglink mob-hide me-6" href="/cart">
                    <div class="cart-icon-container" style="position: relative; display: inline-block;">
                        <img src="/img/cart.webp" alt="Cart for PrimalPantry" width="24" height="24">
                        <span class="cart-badge" style="display: none; position: absolute; top: 0; right: 0; background-color: red; color: white; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; font-size: 12px;">1</span>
                    </div>
                </a>
            </div>
        </div>
    </nav>

</header>

<!-- Script for Cart Badges -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        const cart = JSON.parse(localStorage.getItem('cartV2')) || [];
        const cartBadges = document.querySelectorAll('.cart-badge');
        const tiktokparams = new URLSearchParams(window.location.search);
        const ttclid = tiktokparams.get('ttclid');
        if (ttclid) {
            localStorage.setItem('ttclid', ttclid);
        }

        if (cart.length > 0) {
            cartBadges.forEach(badge => {
                badge.style.display = 'flex';
                badge.textContent = cart.length;
            });
        } else {
            cartBadges.forEach(badge => {
                badge.style.display = 'none';
            });
        }
    });
</script>

<script type="application/javascript">
    // NZ-only: geo detection removed
    var country_code = 'NZ';

    // Clear any stale AU cookie from previous geo detection
    document.cookie = 'country_code=NZ; expires=' + new Date(Date.now() + 30*24*60*60*1000).toUTCString() + '; path=/';

    // Disable link for out of stock
    var outOfStockLinks = document.querySelectorAll('.outOfStock a');
    outOfStockLinks.forEach(function(link) {
        link.addEventListener('click', function(event) {
            if (this.closest('.outOfStock')) {
                event.preventDefault();
                alert('This item is out of stock!');
            }
        });
    });
</script>

<script>
    window.onload = function() {
        var shipping_rate = document.getElementById('shipping_rate');
        if (shipping_rate) {
            shipping_rate.textContent = '$80';
        }
        document.querySelectorAll('.au-content').forEach(function(item) {
            item.style.display = 'none';
        });
        document.querySelectorAll('.nz-content').forEach(function(item) {
            item.style.display = 'inline';
        });
    };
</script>
