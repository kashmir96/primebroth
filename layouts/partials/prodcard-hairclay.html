<div class="product-card pp-card" data-category="haircare" id="prodcard-hairclay">
    <div class="pp-card-img">
        <a href="/shop/products/tallow-hair-clay">
            <img src="/img/shop/hair-clay-shop.webp" alt="Tallow Hair Clay" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-hair-clay">Tallow Hair Clay</a></div>
        <div class="pp-card-sub">Natural hair clay</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.hairclay 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.hairclay 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index (index site.Data.pricing.tallow.ids.hairclay.single "medium-hold") "60ml") "NZ" }}"
                data-pp-pid-au="{{ index (index (index site.Data.pricing.tallow.ids.hairclay.single "medium-hold") "60ml") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Hair Clay"
                data-pp-size="60ml"
                data-pp-flavor="medium-hold">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-hair-clay" class="pp-card-view">View</a>
        </div>
    </div>
</div>
