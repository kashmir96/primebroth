<div class="product-card pp-card" data-category="skincare bundles haircare" id="prodcard-giftbox">
    <div class="pp-card-img">
        <a href="/shop/products/tallow-skincare-giftbox">
            <img src="/img/valentines-shop.webp" alt="Tallow Giftbox" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-skincare-giftbox">Tallow Giftbox</a></div>
        <div class="pp-card-sub">SAVE 20%</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.giftbox 1 }}
            <span class="nz-content">From ${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">From A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.giftbox 1 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.giftbox.single.giftbox "half") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.giftbox.single.giftbox "half") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Giftbox"
                data-pp-size="half"
                data-pp-flavor="giftbox">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-skincare-giftbox" class="pp-card-view">View</a>
        </div>
    </div>
</div>
