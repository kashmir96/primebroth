<div class="pp-card" data-category="skincare" id="prodcard-body-oil">
    <div class="pp-card-img">
        <a href="/shop/products/tallow-body-oil">
            <img src="/img/cleanser/tallow-cleasner-productpage.webp" alt="Tallow Body Oil" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-body-oil">Tallow Body Oil</a></div>
        <div class="pp-card-sub">New</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.bodyoil 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.bodyoil 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.bodyoil.single.lavender "250ml") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.bodyoil.single.lavender "250ml") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Body Oil"
                data-pp-size="250ml"
                data-pp-flavor="Lavender">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-body-oil" class="pp-card-view">View</a>
        </div>
    </div>
</div>
