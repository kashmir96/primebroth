<div class="product-card pp-card" data-category="skincare" id="prodcardshampoo">
    <div class="pp-card-img">
        <a href="/shop/products/manuka-honey-soap/">
            <img src="/img/shop/honey_soap1.webp" alt="Manuka Honey Soap" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/manuka-honey-soap/">Manuka Honey Soap</a></div>
        <div class="pp-card-sub">New</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.soap 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.soap 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.soap.single.manuka "120g") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.soap.single.manuka "120g") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Manuka Honey Soap"
                data-pp-size="120g"
                data-pp-flavor="manuka">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/manuka-honey-soap/" class="pp-card-view">View</a>
        </div>
    </div>
</div>
