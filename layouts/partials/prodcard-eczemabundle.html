<div class="product-card pp-card" data-category="skincare" id="eyecream">
    <div class="pp-card-img">
        <a href="/shop/products/eczema-bundle">
            <img src="/img/shop/EANZ-bundle.webp" alt="Eczema Bundle" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/eczema-bundle">Eczema Bundle</a></div>
        <div class="pp-card-sub">New</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.bundles.pricing.eczema_bundle 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.bundles.pricing.eczema_bundle 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.bundles.ids.eczema_bundle.single.unscented "one-size") "NZ" }}"
                data-pp-pid-au=""
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au=""
                data-pp-title="Eczema Bundle"
                data-pp-size="one-size"
                data-pp-flavor="unscented">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/eczema-bundle" class="pp-card-view">View</a>
        </div>
    </div>
</div>
