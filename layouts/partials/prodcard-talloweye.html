<div class="product-card pp-card" data-category="skincare bestseller" id="eyecream">
    <span class="pp-card-badge">Best Seller</span>
    <div class="pp-card-img">
        <a href="/shop/products/tallow-eye-cream">
            <img src="/img/shop/eyecream.webp" alt="Tallow Eye Cream" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-eye-cream">Tallow Eye Cream</a></div>
        <div class="pp-card-sub">8,000+ Kiwis</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.eyecream 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.eyecream 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.eyecream.single.manukahoney_vitc "10ml") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.eyecream.single.manukahoney_vitc "10ml") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Eye Cream"
                data-pp-size="10ml"
                data-pp-flavor="manukahoney_vitc">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-eye-cream" class="pp-card-view">View</a>
        </div>
    </div>
</div>
