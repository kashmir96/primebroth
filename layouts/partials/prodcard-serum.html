<div class="product-card pp-card" data-category="skincare" id="prodcardtallowserum">
    <span class="pp-card-badge">Best Seller</span>
    <div class="pp-card-img">
        <a href="/shop/products/tallow-serum">
            <img src="/img/serum-shop.webp" alt="Tallow Glow Serum" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-serum">Tallow Glow Serum</a></div>
        <div class="pp-card-sub">New Product!</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.serum 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.serum 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.serum.single.vitc "30ml") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.serum.single.vitc "30ml") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Glow Serum"
                data-pp-size="30ml"
                data-pp-flavor="vitc">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-serum" class="pp-card-view">View</a>
        </div>
    </div>
</div>
