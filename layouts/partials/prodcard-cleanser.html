<div class="product-card pp-card" data-category="skincare" id="prodcard-cleanser">
    <span class="pp-card-badge">Online Exclusive</span>
    <div class="pp-card-img">
        <a href="/shop/products/tallow-cleanser">
            <img src="/img/cleanser/tallow-cleasner-productpage.webp" alt="Tallow Cleanser" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-cleanser">Tallow Cleanser</a></div>
        <div class="pp-card-sub">New</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.cleanser 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.cleanser 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.cleanser.single.geranium "100ml") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.cleanser.single.geranium "100ml") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Cleanser"
                data-pp-size="100ml"
                data-pp-flavor="geranium">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-cleanser" class="pp-card-view">View</a>
        </div>
    </div>
</div>
