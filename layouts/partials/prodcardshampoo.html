<div class="product-card pp-card" data-category="haircare bestseller" id="prodcardshampoo">
    <div class="pp-card-img">
        <a href="/shop/products/tallow-shampoo-bar">
            <img src="/img/shampoobar/shampoo-bar-prodcutpage.webp" alt="Tallow Shampoo Bar" loading="lazy">
        </a>
    </div>
    <div class="pp-card-body">
        <div class="pp-card-name"><a href="/shop/products/tallow-shampoo-bar">Tallow Shampoo Bar</a></div>
        <div class="pp-card-sub">Scalp health shampoo</div>
        <div class="pp-card-price">
            {{ with index site.Data.pricing.tallow.pricing.shampoo 0 }}
            <span class="nz-content">${{ with .prices.NZ }}{{ .single_purchase }}{{ end }}</span>
            <span class="au-content" style="display:none;">A${{ with .prices.AU }}{{ .single_purchase }}{{ end }}</span>
            {{ end }}
        </div>
        <div class="pp-card-cta">
            {{ with index site.Data.pricing.tallow.pricing.shampoo 0 }}
            <button class="pp-card-atc" data-pp-atc
                data-pp-pid="{{ index (index site.Data.pricing.tallow.ids.shampoo.single.peppermintrosemary "120g") "NZ" }}"
                data-pp-pid-au="{{ index (index site.Data.pricing.tallow.ids.shampoo.single.peppermintrosemary "120g") "AU" }}"
                data-pp-price="{{ with .prices.NZ }}{{ .single_purchase }}{{ end }}"
                data-pp-price-au="{{ with .prices.AU }}{{ .single_purchase }}{{ end }}"
                data-pp-title="Tallow Shampoo Bar"
                data-pp-size="120g"
                data-pp-flavor="peppermintrosemary"
                data-pp-flavor-label="Unscented">Add to Cart</button>
            {{ end }}
            <a href="/shop/products/tallow-shampoo-bar" class="pp-card-view">View</a>
        </div>
    </div>
</div>
