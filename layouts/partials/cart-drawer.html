<style>
/* Cart Drawer Styles */

/* Footer */

/* Badge bounce */

<script>
(function() {
    // Prevent double-init if both headers somehow load
    if (window._ppDrawerInit) return;
    window._ppDrawerInit = true;

    // --- Market config ---
    var market = (typeof window.MARKET !== 'undefined') ? window.MARKET : 'NZ';
    var shippingCost = market === 'AU' ? 9.95 : 6.95;
    var freeShipThreshold = market === 'AU' ? 150 : 75;
    var currencyCode = market === 'AU' ? 'AUD' : 'NZD';
    var countryCode = market || 'NZ';

    // --- DOM refs ---
    var overlay = document.getElementById('ppCartOverlay');
    var drawer = document.getElementById('ppCartDrawer');
    var closeBtn = document.getElementById('ppDrawerClose');
    var itemsEl = document.getElementById('ppDrawerItems');
    var footerEl = document.getElementById('ppDrawerFooter');
    var subtotalEl = document.getElementById('ppDrawerSubtotal');
    var countEl = document.getElementById('ppDrawerCount');
    var checkoutBtn = document.getElementById('ppDrawerCheckout');
    var continueBtn = document.getElementById('ppDrawerContinue');
    var shipProgressEl = document.getElementById('ppDrawerShipProgress');

    // --- localStorage proxy (must be defined before saveCart) ---
    var _origSetItem = localStorage.setItem.bind(localStorage);
    var _lastCartLen = (JSON.parse(localStorage.getItem('cartV2')) || []).length;

    // --- Cart helpers ---
    function getCart() { return JSON.parse(localStorage.getItem('cartV2')) || []; }
    function saveCart(c) { _origSetItem('cartV2', JSON.stringify(c)); _lastCartLen = c.length; }
    function getTotalQty(cart) { return cart.reduce(function(s, i) { return s + (parseInt(i.quantity) || 1); }, 0); }

    // --- Drawer open/close ---
    function openDrawer() {
        renderDrawer();
        checkoutBtn.disabled = false;
        checkoutBtn.textContent = 'Proceed to Checkout';
        drawer.classList.add('open');
        overlay.classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeDrawer() {
        drawer.classList.remove('open');
        overlay.classList.remove('open');
        document.body.style.overflow = '';
    }

    // --- Badge ---
    function updateBadge() {
        var cart = getCart(), count = getTotalQty(cart);
        document.querySelectorAll('.cart-badge').forEach(function(badge) {
            badge.textContent = count;
            badge.style.display = count > 0 ? 'flex' : 'none';
        });
    }

    function triggerBounce() {
        document.querySelectorAll('.cart-icon-container').forEach(function(c) {
            c.classList.remove('bounce');
            void c.offsetWidth;
            c.classList.add('bounce');
            setTimeout(function() { c.classList.remove('bounce'); }, 700);
        });
    }

    // --- Shipping progress ---
    function renderShipProgress(subtotal) {
        if (!shipProgressEl) return;
        var pct = Math.min(subtotal / freeShipThreshold * 100, 100);
        var remaining = (freeShipThreshold - subtotal).toFixed(2);
        var unlocked = subtotal >= freeShipThreshold;
        var symbol = market === 'AU' ? 'A$' : '$';
        shipProgressEl.innerHTML =
            '<div class="pp-ship-progress-wrap">'
          + '<div class="pp-ship-progress-text' + (unlocked ? ' unlocked' : '') + '">'
          + (unlocked
              ? '&#10003; Free shipping unlocked!'
              : 'Add ' + symbol + remaining + ' more for <strong>free shipping</strong>')
          + '</div>'
          + '<div class="pp-ship-bar-track"><div class="pp-ship-bar-fill' + (unlocked ? ' full' : '') + '" style="width:' + pct + '%"></div></div>'
          + '</div>';
    }

    // --- Render drawer ---
    function renderDrawer() {
        var cart = getCart(), count = getTotalQty(cart);
        countEl.textContent = count > 0 ? '(' + count + ')' : '';

        if (cart.length === 0) {
            itemsEl.innerHTML = '<div class="pp-drawer-empty">'
                + '<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>'
                + '<p>Your cart is empty</p>'
                + '<a href="/shop">Shop Now</a></div>';
            footerEl.style.display = 'none';
            shipProgressEl.innerHTML = '';
            return;
        }
        footerEl.style.display = '';

        var html = '', subtotal = 0;
        cart.forEach(function(item, i) {
            var qty = parseInt(item.quantity) || 1;
            var price = parseFloat(item.unitPrice) || 0;
            var line = price * qty;
            subtotal += line;

            var priceSuffix = '';
            if (item.orderType && item.orderType.indexOf('Quarterly') > -1) priceSuffix = '/3mo';
            else if (item.orderType && item.orderType.indexOf('Monthly') > -1) priceSuffix = '/mo';

            var metaFlavor = (item.title === 'Tallow Soothing Routine') ? null : item.flavor;
            var metaSize = (item.title === 'Tallow Soothing Routine') ? 'Balm, Shampoo bar & Lip balm' : item.size;
            var meta = [metaFlavor, metaSize].filter(Boolean).join(' \u00b7 ');
            if (item.orderType && item.orderType !== 'Single') {
                meta += (meta ? ' \u00b7 ' : '') + item.orderType;
            }

            var imgSrc = item.image || _cardImages[item.title] || '';
            var imgHtml = imgSrc
                ? '<div class="pp-drawer-item-img"><img src="' + imgSrc + '" alt="' + (item.title || '') + '"></div>'
                : '<div class="pp-drawer-item-img"></div>';

            html += '<div class="pp-drawer-item">'
                + imgHtml
                + '<div><div class="pp-drawer-item-name">' + (item.title || 'Product') + '</div>'
                + '<div class="pp-drawer-item-meta">' + meta + '</div></div>'
                + '<div class="pp-drawer-item-right">'
                + '<div class="pp-drawer-item-price">$' + line.toFixed(2) + priceSuffix + '</div>'
                + '<div class="pp-drawer-item-actions">'
                + '<button class="pp-drawer-qty-btn" data-action="minus" data-i="' + i + '">\u2212</button>'
                + '<span class="pp-drawer-qty-val">' + qty + '</span>'
                + '<button class="pp-drawer-qty-btn" data-action="plus" data-i="' + i + '">+</button>'
                + '<button class="pp-drawer-remove" data-i="' + i + '"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg></button>'
                + '</div></div></div>';
        });
        itemsEl.innerHTML = html;

        // Shipping + totals
        var freeShip = subtotal >= freeShipThreshold;
        var shipping = freeShip ? 0 : shippingCost;
        var total = subtotal + shipping;

        subtotalEl.textContent = '$' + subtotal.toFixed(2);

        var shipRow = document.getElementById('ppDrawerShipRow');
        var freeRow = document.getElementById('ppDrawerFreeRow');
        var totalEl = document.getElementById('ppDrawerTotal');
        var shipTag = document.getElementById('ppDrawerShipTag');
        var shipCostEl = document.getElementById('ppDrawerShipCost');
        if (shipRow) shipRow.style.display = freeShip ? 'none' : '';
        if (freeRow) freeRow.style.display = freeShip ? '' : 'none';
        if (totalEl) totalEl.textContent = '$' + total.toFixed(2);
        if (shipTag) shipTag.textContent = market === 'AU' ? 'AU flat rate' : 'NZ flat rate';
        if (shipCostEl) shipCostEl.textContent = '$' + shippingCost.toFixed(2);

        renderShipProgress(subtotal);

        // PrimalPoints hint (NZ only)
        var ptsEl = document.getElementById('ppDrawerPoints');
        if (ptsEl && market === 'NZ' && subtotal > 0) {
            var pts = Math.ceil(subtotal * 50 / 10) * 10;
            ptsEl.innerHTML = 'Earn ~<strong>' + pts.toLocaleString() + ' PrimalPoints</strong> on this order';
            ptsEl.style.display = '';
        } else if (ptsEl) {
            ptsEl.style.display = 'none';
        }

        // Qty +/- handlers
        itemsEl.querySelectorAll('.pp-drawer-qty-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var c = getCart(), idx = parseInt(btn.dataset.i);
                if (btn.dataset.action === 'plus') {
                    c[idx].quantity = (parseInt(c[idx].quantity) || 1) + 1;
                } else {
                    if ((parseInt(c[idx].quantity) || 1) > 1) c[idx].quantity = parseInt(c[idx].quantity) - 1;
                    else c.splice(idx, 1);
                }
                saveCart(c); updateBadge(); renderDrawer();
            });
        });
        // Remove handlers
        itemsEl.querySelectorAll('.pp-drawer-remove').forEach(function(btn) {
            btn.addEventListener('click', function() {
                var c = getCart(); c.splice(parseInt(btn.dataset.i), 1);
                saveCart(c); updateBadge(); renderDrawer();
            });
        });
    }

    // --- Checkout: navigate to embedded checkout page ---
    checkoutBtn.addEventListener('click', function() {
        var cart = getCart();
        if (!cart.length) return;

        // Analytics: GA
        if (typeof gtag !== 'undefined') {
            var sub = cart.reduce(function(s, i) { return s + (parseFloat(i.unitPrice) || 0) * (parseInt(i.quantity) || 1); }, 0);
            gtag('event', 'begin_checkout', {
                currency: currencyCode,
                value: sub,
                items: cart.map(function(i) {
                    return { item_id: i.priceId, item_name: i.title, item_variant: i.flavor || '', item_category: i.size || '', price: parseFloat(i.unitPrice), quantity: parseInt(i.quantity) || 1 };
                })
            });
        }
        // Oso Analytics: proceed to checkout
        if (typeof oso === 'function') oso('event', 'proceed to checkout');

        // Navigate to embedded checkout page
        window.location.href = '/checkout/';
    });

    // --- Event listeners ---
    // Cart trigger buttons (from both header.html and header_new.html)
    document.querySelectorAll('.pp-cart-trigger').forEach(function(btn) {
        btn.addEventListener('click', function(e) { e.preventDefault(); openDrawer(); });
    });
    overlay.addEventListener('click', closeDrawer);
    closeBtn.addEventListener('click', closeDrawer);
    continueBtn.addEventListener('click', closeDrawer);
    document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeDrawer(); });

    // --- Global API for product pages ---
    window.ppOpenCartDrawer = function() { triggerBounce(); openDrawer(); };

    // Backwards compat: old pages call these
    window.updateCartBadge = function() { updateBadge(); };
    window.triggerCartBounce = function(productName) { triggerBounce(); openDrawer(); };

    // --- Product card image map (used to auto-attach images to cart items) ---
    var _cardImages = {
        "Tallow Balm - Whipped":"/img/shop/balm.webp",
        "Whipped Tallow Balm":"/img/shop/balm.webp",
        "Tallow & Honey Balm":"/img/shop/honeyshop.webp",
        "Tallow Eye Cream":"/img/shop/eyecream.webp",
        "Tallow Glow Serum":"/img/serum-shop.webp",
        "Tallow Deodorant":"/img/shop/deod.webp",
        "Tallow Lip Balm":"/img/lip-balm-images1.webp",
        "Tallow Lip Balm Stick":"/img/shop/lipshop.webp",
        "Tallow Shampoo Bar":"/img/shampoobar/shampoo-bar-prodcutpage.webp",
        "Tallow Scalp Shampoo":"/img/liqshampoo-shop.webp",
        "Tallow Conditioner":"/img/conditioner-shop.webp",
        "Tallow Hair Clay":"/img/shop/hair-clay-shop.webp",
        "Tallow Beard Balm":"/img/shop/shopbeardi.webp",
        "Unwhipped Tallow Balm":"/img/shop/shop-unwhipped.webp",
        "Tallow Cleanser":"/img/cleanser/tallow-cleasner-productpage.webp",
        "Tallow Body Oil":"/img/cleanser/tallow-cleasner-productpage.webp",
        "Tallow Liquid Soap":"/img/natural-soap-cutout.webp",
        "Aloe Tallow Body Lotion":"/img/body-lotion-natural-cutout.webp",
        "Tallow Soap":"/img/soaps/tallow-soap-range-productpage.webp",
        "Tallow Soap Mixed Sampler":"/img/soaps-new/mixed-prod.webp",
        "Manuka Honey Soap":"/img/shop/honey_soap1.webp",
        "Non-Tox Tallow Dish Block":"/img/dish-shop.webp",
        "Colloidal Oat Bath Soak":"/img/colloidal_oat1.webp",
        "Tallow + Zinc Summer Balm":"/img/summer1.webp",
        "Tallow Sunbalm":"/img/sunscreen/main.webp",
        "Tallow Day n Night Balms":"/img/limited-shop.webp",
        "Tallow Baby Butter":"/img/baby-butter-shop.webp",
        "Tallow Baby Skincare Kit":"/img/bundle-babies-skincare.webp",
        "Tallow Giftbox":"/img/valentines-shop.webp",
        "Eczema Bundle":"/img/shop/EANZ-bundle.webp",
        "Men's Bundle":"/img/shop/fathersbundle1.webp",
        "Tallow Haircare Bundle":"/img/scalpbundle-shop.webp",
        "Ultimate Tallow Bundle":"/img/ultimate-bundle.webp",
        "Tallow Balm Mixed Bundle":"/img/dec24/product-trio.webp",
        "Tallow Liquid Soap & Lotion Bundle":"/img/liquid-shop.webp",
        "The Golden Stack":"/img/shop/shop-gold.webp",
        "Tallow Soothing Routine":"/img/shop/shop-gold.webp",
        "Sensitive Skin Tallow Stack":"/img/sensitive-stack-tub.webp",
        "Tallow Anti-aging Kit":"/img/wrinkleskinnew.webp",
        "Tallow Balm - DIY kit":"/img/tallow-balm.webp",
        "Reviana Day Cream":"/img/reviana-day-jar.webp",
        "Reviana Night Cream":"/img/reviana-night-jar.webp",
        "Reviana Eye Cream":"/img/reviana-eye-jar.webp",
        "Reviana Serum":"/img/reviana-serum-jar.webp",
        "Reviana Complete Ritual Bundle":"/img/r2-reviana-range-square.webp",
        "Reviana - Tallow Cosmetics":"/img/r2-reviana-range-square.webp",
        "Nourishing Tallow Conditioner":"/img/conditioner-shop.webp"
    };

    // --- Auto-detect cart changes from product pages ---
    localStorage.setItem = function(key, value) {
        // Auto-attach product card image to new cart items that lack one
        if (key === 'cartV2') {
            try {
                var parsed = JSON.parse(value) || [];
                var patched = false;
                for (var k = 0; k < parsed.length; k++) {
                    if (!parsed[k].image && parsed[k].title && _cardImages[parsed[k].title]) {
                        parsed[k].image = _cardImages[parsed[k].title];
                        patched = true;
                    }
                }
                if (patched) value = JSON.stringify(parsed);
            } catch(e) {}
        }
        _origSetItem(key, value);
        if (key === 'cartV2') {
            var newCart = [];
            try { newCart = JSON.parse(value) || []; } catch(e) {}
            updateBadge();
            // Only auto-open drawer if items were added (not removed)
            if (newCart.length > _lastCartLen) {
                triggerBounce();
                openDrawer();

                // Analytics: GA
                if (typeof gtag !== 'undefined') {
                    var newest = newCart[newCart.length - 1];
                    if (newest) {
                        gtag('event', 'add_to_cart', {
                            currency: currencyCode,
                            value: (parseFloat(newest.unitPrice) || 0) * (parseInt(newest.quantity) || 1),
                            items: [{ item_id: newest.priceId, item_name: newest.title, item_variant: newest.flavor || '', item_category: newest.size || '', price: parseFloat(newest.unitPrice), quantity: parseInt(newest.quantity) || 1 }]
                        });
                    }
                }
                // Oso Analytics: add to cart
                var newest = newCart[newCart.length - 1];
                if (typeof oso === 'function' && newest) oso('event', 'add to cart', newest.title);
            }
            _lastCartLen = newCart.length;
        }
    };

    // --- Cross-tab sync ---
    window.addEventListener('storage', function(e) {
        if (e.key === 'cartV2') {
            updateBadge();
            _lastCartLen = getCart().length;
        }
    });

    // --- Kill legacy add-to-cart modals & alerts ---
    // Product pages (50+) call: $().modal('show') or alert('Item added...')
    // The drawer (via localStorage proxy) replaces both.
    // 1. Remove modal element so getElementById returns null
    // 2. Suppress the fallback alert() for that specific message
    document.addEventListener('DOMContentLoaded', function() {
        var oldModal = document.getElementById('addedToCartModal');
        if (oldModal) oldModal.remove();
    });
    var _origAlert = window.alert;
    window.alert = function(msg) {
        if (typeof msg === 'string' && msg.indexOf('added to cart') > -1) {
            // Fallback: open drawer when localStorage proxy missed (e.g. mobile Safari)
            updateBadge();
            triggerBounce();
            openDrawer();
            return;
        }
        return _origAlert.apply(window, arguments);
    };

    // --- Init ---
    updateBadge();

    // TikTok click ID persistence
    var tiktokparams = new URLSearchParams(window.location.search);
    var ttclid = tiktokparams.get('ttclid');
    if (ttclid) { _origSetItem('ttclid', ttclid); }
})();
</script>
