<!DOCTYPE html>
<html lang="en">
<head>
    {{- partial "head.html" . }}
    <title>Checkout - PrimalPantry</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Stripe loaded on /checkout/ page instead -->
</head>
<body>
    {{- partial "header_new.html" . }}

    <div class="cart-page-wrapper">
        <div class="container py-4">
            <div id="cartempty" class="empty-cart-container d-none">
                <div class="empty-cart-content">
                    <h1 class="empty-cart-title">Your cart is empty</h1>
                    <a href="/shop" class="btn-continue-shopping">Continue shopping</a>
                </div>
            </div>
            <div class="cartcontainerall d-none">                
                <div class="cart-layout">
                    <!-- Left Column: Cart Items -->
                    <div class="cart-items-column">
                        <div id="cart-items" class="cart-items-container">
                            <!-- Cart items will be dynamically injected here -->
                        </div>
                    </div>

                    <!-- Right Column: Order Summary -->
                    <div class="cart-summary-column">
                        <div id="cart-summary" class="summary-box">
                            <h2 class="summary-title">Order Summary</h2>
                            
                            <div class="summary-row">
                                <span>Subtotal</span>
                                <span id="subtotal-cost">$0.00</span>
                            </div>
                            <div class="summary-row" id="shipping-row">
                                <span id="shipping-label">Shipping</span>
                                <span id="shipping-display">$6.95</span>
                            </div>
                            <div class="summary-row d-none" id="free-shipping-row">
                                <span>Shipping</span>
                                <span class="free-shipping-text">FREE</span>
                            </div>
                            <div class="summary-row total-row">
                                <span>Total</span>
                                <span id="total-cost">$0.00</span>
                            </div>

                            <button id="proceed-to-checkout" class="checkout-btn" disabled>Proceed to Checkout</button>

                            <div class="trust-signals">
                                <span class="trust-item">🚚 NZ Wide</span>
                                <span class="trust-item-separator">•</span>
                                <span class="trust-item">✓ Money Back Guarantee</span>
                            </div>

                            <div class="payment-icons">
                                <img class="badges" src="/img/stripe-badge-transparent.webp" alt="stripe secure badges">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Sample limit toast -->
    <div id="sample-limit-toast" class="sample-limit-toast d-none">Sorry, one sample per customer</div>

    {{- partial "footer.html" . }}

    <script>
        // Pricing data from YAML
        const pricingData = JSON.parse('{{ .Site.Data.pricing | jsonify }}');

        document.addEventListener('DOMContentLoaded', function() {
            let cart = JSON.parse(localStorage.getItem('cartV2')) || [];
            console.log('Cart contents:', cart);

            // Use window.MARKET (set by market.js) as the source of truth.
            // Fall back to cookie then NZ if market.js somehow hasn't run.
            const countryCode = (window.MARKET) || getCountryCookie('country_code') || 'NZ';
            
            let shippingCost = 6.95;
            let freeShippingThreshold = 80;
            
            if (countryCode === 'AU') {
                shippingCost = 9.95;
                freeShippingThreshold = 150;
            }

            // Update shipping label to reflect correct threshold
            const shippingLabel = document.getElementById('shipping-label');
            if (shippingLabel) {
                shippingLabel.textContent = countryCode === 'AU'
                    ? 'Shipping (Free over A$150)'
                    : 'Shipping (Free over $80)';
            }

            const cartItemsContainer = document.getElementById('cart-items');
            const totalCostElement = document.getElementById('total-cost');
            const subtotalCostElement = document.getElementById('subtotal-cost');
            const proceedToCheckoutButton = document.getElementById('proceed-to-checkout');

            function isThreePack(item) {
                if (!item.orderType) return false;
                const orderTypeLower = item.orderType.toLowerCase();
                return orderTypeLower.includes('pack') || 
                       orderTypeLower.includes('3 pack') || 
                       orderTypeLower.includes('three') ||
                       orderTypeLower.includes('2 get 1');
            }

            function isSample(item) {
                return item.title && item.title.toLowerCase().includes('sample');
            }

            function cartHasSample() {
                return cart.some(item => isSample(item));
            }

            function showSampleLimitToast() {
                const toast = document.getElementById('sample-limit-toast');
                toast.classList.remove('d-none');
                toast.classList.add('show');
                setTimeout(() => {
                    toast.classList.remove('show');
                    toast.classList.add('d-none');
                }, 3000);
            }

            function enforceSampleLimit() {
                let sampleFound = false;
                let removed = false;
                const filtered = [];
                for (const item of cart) {
                    if (isSample(item)) {
                        if (sampleFound) {
                            removed = true;
                            continue;
                        }
                        sampleFound = true;
                        item.quantity = 1;
                    }
                    filtered.push(item);
                }
                if (removed) {
                    cart = filtered;
                    localStorage.setItem('cartV2', JSON.stringify(cart));
                    showSampleLimitToast();
                }
            }

            function updateCart() {
                enforceSampleLimit();

                cartItemsContainer.innerHTML = '';
                let subtotal = 0;

                cart.forEach((item, index) => {
                    const quantity = parseInt(item.quantity, 10);
                    const unitPrice = parseFloat(item.unitPrice).toFixed(2);
                    const itemIsSample = isSample(item);

                    let priceSuffix = '';
                    if (item.orderType && item.orderType.includes('Quarterly')) {
                        priceSuffix = '<span class="price-suffix">/3mo</span>';
                    } else if (item.orderType && item.orderType.includes('Monthly')) {
                        priceSuffix = '<span class="price-suffix">/mo</span>';
                    }

                    const lineItemTotal = (unitPrice * quantity).toFixed(2);
                    subtotal += parseFloat(lineItemTotal);

                    const cartItem = document.createElement('div');
                    cartItem.className = 'cart-item';

                    const qtyHtml = itemIsSample
                        ? `<div class="item-quantity"><span class="qty-value">1</span></div>`
                        : `<div class="item-quantity">
                            <button class="qty-btn qty-minus" data-index="${index}">−</button>
                            <span class="qty-value">${quantity}</span>
                            <button class="qty-btn qty-plus" data-index="${index}">+</button>
                           </div>`;

                    const imgSrc = item.image || '';
                    const imgHtml = imgSrc
                        ? `<div class="item-img"><img src="${imgSrc}" alt="${item.title || ''}"></div>`
                        : '';

                    if (item.orderTypeVal === 'three_pack') {
                        const flavorList = item.flavors.map(f => f).join(', ');
                        let savingsText = 'Buy 2 Get 1 Free';
                        if (item.orderType) {
                            const match = item.orderType.match(/\(([^)]+)\)/);
                            if (match) savingsText = match[1];
                        }
                        cartItem.innerHTML = `
                            <div class="item-product">
                                ${imgHtml}
                                <div class="item-details">
                                    <h3 class="item-title">${item.title || 'Unknown Product'} 3pk</h3>
                                    <p class="item-meta"><span class="savings-text">${savingsText}</span> • 3 jars • ${flavorList} ${item.size}</p>
                                </div>
                            </div>
                            <div class="item-price">$${unitPrice}${priceSuffix}</div>
                            ${qtyHtml}
                            <div class="item-total">
                                <span class="item-total-price">$${lineItemTotal}${priceSuffix}</span>
                                <button class="remove-item" data-index="${index}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        `;
                    } else {
                        const isItemThreePack = isThreePack(item);
                        const titleSuffix = isItemThreePack ? ' 3pk' : '';

                        let metaText;
                        if (isItemThreePack) {
                            let savingsText = 'Buy 2 Get 1 Free';
                            if (item.orderType) {
                                const match = item.orderType.match(/\(([^)]+)\)/);
                                if (match) savingsText = match[1];
                            }
                            metaText = `<span class="savings-text">${savingsText}</span> • 3 jars of ${item.flavor || ''} ${item.size || ''}`;
                        } else {
                            const cartFlavor = (item.title === 'Tallow Soothing Routine') ? null : item.flavor;
                            const cartSize = (item.title === 'Tallow Soothing Routine') ? 'Balm, Shampoo bar & Lip balm' : item.size;
                            metaText = [cartFlavor, cartSize].filter(Boolean).join(' • ');
                        }

                        cartItem.innerHTML = `
                            <div class="item-product">
                                ${imgHtml}
                                <div class="item-details">
                                    <h3 class="item-title">${item.title || 'Unknown Product'}${titleSuffix}</h3>
                                    <p class="item-meta">${metaText}</p>
                                </div>
                            </div>
                            <div class="item-price">$${unitPrice}${priceSuffix}</div>
                            ${qtyHtml}
                            <div class="item-total">
                                <span class="item-total-price">$${lineItemTotal}${priceSuffix}</span>
                                <button class="remove-item" data-index="${index}">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
                                    </svg>
                                </button>
                            </div>
                        `;
                    }
                    cartItemsContainer.appendChild(cartItem);
                });

                let totalCost = subtotal;
                const shippingRow = document.getElementById('shipping-row');
                const freeShippingRow = document.getElementById('free-shipping-row');
                const shippingDisplay = document.getElementById('shipping-display');
                
                if (subtotal < freeShippingThreshold && cart.length > 0) {
                    totalCost = subtotal + shippingCost;
                    shippingRow.classList.remove('d-none');
                    freeShippingRow.classList.add('d-none');
                    shippingDisplay.textContent = '$' + shippingCost.toFixed(2);
                } else {
                    shippingRow.classList.add('d-none');
                    if (cart.length > 0) {
                        freeShippingRow.classList.remove('d-none');
                    } else {
                        freeShippingRow.classList.add('d-none');
                    }
                }

                let totalPriceSuffix = '';
                if (cart.some(item => item.orderType && item.orderType.includes('Quarterly'))) {
                    totalPriceSuffix = '<span class="price-suffix">/3mo</span>';
                } else if (cart.some(item => item.orderType && item.orderType.includes('Monthly'))) {
                    totalPriceSuffix = '<span class="price-suffix">/mo</span>';
                }
                
                subtotalCostElement.innerHTML = `$${subtotal.toFixed(2)}${totalPriceSuffix}`;
                totalCostElement.innerHTML = `$${totalCost.toFixed(2)}${totalPriceSuffix}`;
                proceedToCheckoutButton.disabled = cart.length === 0;

                const cartContainer = document.querySelector('.cartcontainerall');
                const cartEmptyDiv = document.querySelector('#cartempty');
                
                if (cart.length === 0) {
                    if (cartContainer) cartContainer.classList.add('d-none');
                    if (cartEmptyDiv) {
                        cartEmptyDiv.classList.remove('d-none');
                        cartEmptyDiv.style.display = 'flex';
                    }
                } else {
                    if (cartContainer) cartContainer.classList.remove('d-none');
                    if (cartEmptyDiv) {
                        cartEmptyDiv.classList.add('d-none');
                        cartEmptyDiv.style.display = '';
                    }
                }

                document.querySelectorAll('.qty-minus').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = this.getAttribute('data-index');
                        if (cart[index].quantity > 1) {
                            cart[index].quantity = parseInt(cart[index].quantity, 10) - 1;
                            localStorage.setItem('cartV2', JSON.stringify(cart));
                            updateCart();
                        }
                    });
                });

                document.querySelectorAll('.qty-plus').forEach(btn => {
                    btn.addEventListener('click', function() {
                        const index = this.getAttribute('data-index');
                        if (isSample(cart[index])) {
                            showSampleLimitToast();
                            return;
                        }
                        cart[index].quantity = parseInt(cart[index].quantity, 10) + 1;
                        localStorage.setItem('cartV2', JSON.stringify(cart));
                        updateCart();
                    });
                });

                document.querySelectorAll('.remove-item').forEach(button => {
                    button.addEventListener('click', function () {
                        const index = this.getAttribute('data-index');
                        cart.splice(index, 1);
                        localStorage.setItem('cartV2', JSON.stringify(cart));
                        updateCart();
                    });
                });
            }

            window.addEventListener('storage', function () {
                cart = JSON.parse(localStorage.getItem('cartV2')) || [];
                updateCart();
            });

            updateCart();

            proceedToCheckoutButton.addEventListener('click', function () {
                // Navigate to embedded checkout page
                window.location.href = '/checkout/';
            });
        });
    </script>
    
    <style>
        :root {
            --cream: #FAF7F2;
            --warm-brown: #8B7355;
            --deep-brown: #4A3728;
            --sage: #9CAF88;
            --sage-dark: #7A9168;
            --charcoal: #2D2A26;
            --soft-white: #FFFFFF;
            --border-light: rgba(139, 115, 85, 0.15);
        }

        .cart-page-wrapper {
            background: var(--cream);
            min-height: 80vh;
            font-family: 'DM Sans', sans-serif;
            padding-top: 0;
        }

        .cart-page-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.75rem;
            font-weight: 400;
            color: var(--deep-brown);
            margin-bottom: 16px;
        }

        .cart-layout {
            display: grid;
            grid-template-columns: 1fr 340px;
            gap: 32px;
        }

        .cart-items-container {
            background: var(--soft-white);
            border: 1px solid var(--border-light);
            border-radius: 6px;
        }

        .cart-item {
            display: grid;
            grid-template-columns: 2fr 80px 100px 100px;
            padding: 14px 18px;
            border-bottom: 1px solid var(--border-light);
            align-items: center;
            gap: 12px;
        }

        .cart-item:last-child { border-bottom: none; }

        .item-product {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .item-img {
            width: 64px; height: 64px; border-radius: 8px; overflow: hidden;
            background: var(--cream); border: 1px solid var(--border-light);
            flex-shrink: 0;
        }
        .item-img img {
            width: 100%; height: 100%; object-fit: cover; display: block;
        }

        .item-details { flex: 1; }

        .item-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--deep-brown);
            margin: 0 0 4px 0;
        }

        .item-meta {
            font-size: 1.1rem;
            color: var(--warm-brown);
            margin: 0;
        }

        .savings-text {
            color: var(--sage-dark);
            font-weight: 600;
        }

        .item-price {
            font-weight: 500;
            color: var(--charcoal);
            font-size: 1.35rem;
        }

        .item-quantity {
            display: flex;
            align-items: center;
            gap: 6px;
            justify-content: center;
        }

        .qty-btn {
            width: 24px;
            height: 24px;
            border: 1px solid var(--border-light);
            background: var(--soft-white);
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.9rem;
            color: var(--charcoal);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .qty-btn:hover {
            border-color: var(--sage);
            color: var(--sage-dark);
        }

        .qty-value {
            min-width: 20px;
            text-align: center;
            font-weight: 500;
            font-size: 0.85rem;
        }

        .item-total {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
        }

        .item-total-price {
            font-weight: 600;
            color: var(--charcoal);
            font-size: 1.4rem;
        }

        .remove-item {
            background: none;
            border: none;
            color: var(--warm-brown);
            cursor: pointer;
            opacity: 0.5;
            padding: 2px;
        }

        .remove-item:hover {
            opacity: 1;
            color: #c44;
        }

        .cart-summary-column {
            position: sticky;
            top: 100px;
            align-self: start;
        }

        .summary-box {
            background: var(--soft-white);
            border-radius: 6px;
            border: 1px solid var(--border-light);
            padding: 20px;
        }

        .summary-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--deep-brown);
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 1px solid var(--border-light);
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85rem;
            color: var(--charcoal);
        }

        .summary-row.d-none { display: none !important; }

        .free-shipping-text {
            color: var(--sage-dark);
            font-weight: 600;
        }

        .total-row {
            font-size: 1rem;
            font-weight: 600;
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border-light);
        }

        .checkout-btn {
            width: 100%;
            background: var(--charcoal);
            color: var(--soft-white);
            border: none;
            padding: 14px 20px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            margin-top: 16px;
        }

        .checkout-btn:hover:not(:disabled) { background: var(--deep-brown); }
        .checkout-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .trust-signals {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding-top: 14px;
            border-top: 1px solid var(--border-light);
        }

        .trust-item {
            font-size: 0.7rem;
            color: var(--warm-brown);
        }

        .trust-item-separator {
            font-size: 0.7rem;
            color: var(--warm-brown);
            opacity: 0.5;
        }

        .payment-icons {
            display: flex;
            justify-content: center;
            margin-top: 12px;
        }

        .payment-icons .badges {
            max-width: 100%;
            height: auto;
        }

        .empty-cart-container {
            min-height: 50vh;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .empty-cart-container:not(.d-none) { 
            display: flex !important; 
        }

        .empty-cart-content { text-align: center; }

        .empty-cart-title {
            font-family: 'DM Sans', sans-serif;
            font-size: 1.8rem;
            font-weight: 500;
            color: var(--deep-brown);
            margin-bottom: 24px;
        }

        .btn-continue-shopping {
            display: inline-block;
            background: var(--charcoal);
            color: var(--soft-white);
            padding: 14px 32px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 4px;
            text-decoration: none;
        }

        .btn-continue-shopping:hover {
            background: var(--deep-brown);
            color: var(--soft-white);
            text-decoration: none;
        }

        .price-suffix {
            font-size: 0.75em;
            color: var(--warm-brown);
        }

        .sample-limit-toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--charcoal);
            color: var(--soft-white);
            padding: 12px 24px;
            border-radius: 6px;
            font-family: 'DM Sans', sans-serif;
            font-size: 0.9rem;
            font-weight: 500;
            z-index: 9999;
            opacity: 0;
            transition: opacity 0.3s ease, transform 0.3s ease;
            pointer-events: none;
        }

        .sample-limit-toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        @media (max-width: 900px) {
            .cart-layout {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .cart-summary-column { position: static; }

            .cart-item {
                grid-template-columns: 1fr auto;
                grid-template-rows: auto auto;
                gap: 6px 12px;
            }

            .item-product { grid-column: 1 / -1; }
            .item-price { display: none; }
            .item-quantity { justify-content: flex-start; }
            .item-total { justify-content: flex-end; }
        }

        @media (max-width: 480px) {
            .item-title { font-size: 1.25rem; }
            .item-meta { font-size: 1rem; }
            .item-total-price { font-size: 1.2rem; }
            .summary-box { padding: 16px; }
        }
    </style>
</body>
</html>
